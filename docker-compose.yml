services:
  recall:
    build: .
    image: fusional-recall:latest
    container_name: fusional-recall
    restart: unless-stopped
    ports:
      - "${RECALL_PORT:-8107}:8107"
    volumes:
      - recall_data:/app/data
      - ${SOLVED_ISSUES_PATH:-/dev/null}:/kb/SOLVED-ISSUES.md:ro
    environment:
      RECALL_HOST: "0.0.0.0"
      RECALL_PORT: "8107"
      RECALL_DB_PATH: "/app/data/recall.db"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-all-MiniLM-L6-v2}"
      DEFAULT_TIER: "${DEFAULT_TIER:-personal}"
      SOLVED_ISSUES_PATH: "/kb/SOLVED-ISSUES.md"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 8107)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  recall_data:
